name: Terraform Plan

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep '\.tf$' | sed 's|/[^/]*\.tf$||' | sort -u | grep -v '^00-bootstrap' || true)
          MODULES=$(echo "$CHANGED" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install checkov
        run: pip install checkov==3.2.531

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.62.1

      - name: Terraform fmt check
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - run: terraform fmt -recursive -check .

      - name: Run tflint
        run: |
          tflint --init
          tflint --recursive

      - name: Run checkov
        run: checkov --config-file .checkov.yaml

  plan:
    runs-on: ubuntu-latest
    needs: [detect-modules, lint-and-security]
    if: needs.detect-modules.outputs.modules != '[]'
    env:
      TF_VAR_alert_email: ${{ secrets.TF_VAR_ALERT_EMAIL }}
    strategy:
      matrix:
        module: ${{ fromJson(needs.detect-modules.outputs.modules) }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Terraform Init
        run: terraform -chdir=${{ matrix.module }} init -input=false -backend-config=backend.hcl

      - name: Terraform Plan
        id: plan
        run: terraform -chdir=${{ matrix.module }} plan -no-color -input=false
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Module: \`${{ matrix.module }}\`
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Fail job if plan failed
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::terraform plan falhou para ${{ matrix.module }} (ver comentário no PR)"
          exit 1
