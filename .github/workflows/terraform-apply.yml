name: Terraform Apply

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      module:
        description: "Módulo para aplicar (manual)"
        type: choice
        required: true
        default: all
        options:
          - all
          - s3-static-site
          - ec2-first-instance
          - billing-alerts
          - iam-basics

permissions:
  id-token: write
  contents: read

jobs:
  detect-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect modules
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Disparo manual: aplica o módulo escolhido (ou todos)
            if [ "${{ inputs.module }}" = "all" ]; then
              MODULES=$(find 01-cloud-practitioner -mindepth 2 -maxdepth 2 -name '*.tf' | sed 's|/[^/]*$||' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            else
              MODULES='["01-cloud-practitioner/${{ inputs.module }}"]'
            fi
          else
            # Push na main: aplica apenas os módulos com .tf alterado
            CHANGED=$(git diff --name-only HEAD~1...HEAD | grep '\.tf$' | sed 's|/[^/]*\.tf$||' | sort -u | grep -v '^00-bootstrap' || true)
            MODULES=$(echo "$CHANGED" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

  apply:
    runs-on: ubuntu-latest
    needs: detect-modules
    if: needs.detect-modules.outputs.modules != '[]'
    # Gate de aprovação manual: o apply aguarda um reviewer aprovar no
    # GitHub Environment "production" antes de alterar a infraestrutura.
    environment: production
    env:
      TF_VAR_alert_email: ${{ secrets.TF_VAR_ALERT_EMAIL }}
    strategy:
      matrix:
        module: ${{ fromJson(needs.detect-modules.outputs.modules) }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Terraform Init
        run: terraform -chdir=${{ matrix.module }} init -input=false -backend-config=backend.hcl

      - name: Terraform Apply
        run: terraform -chdir=${{ matrix.module }} apply -auto-approve -input=false
