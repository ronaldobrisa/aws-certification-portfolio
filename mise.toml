# Política: nunca usar "latest". Versões fixadas um minor atrás do latest.
# mise fixado em 2026.5.18 (latest 2026.6.0); atualizar via `mise self-update <versão>`.
min_version = "2026.5.18"

[tools]
terraform = "1.14.9"
aws-vault = "7.10.8"
tflint = "0.62.1"
checkov = "3.2.531"

[env]
AWS_VAULT_PROFILE = "rbti"

[tasks."tf:init"]
description = "Initialize Terraform module. Usage: mise run tf:init <module-path>"
run = """
#!/bin/bash
BACKEND_FLAG=""
if [ -f "$1/backend.hcl" ]; then
  BACKEND_FLAG="-backend-config=backend.hcl"
fi
if [ -n "$AWS_VAULT" ]; then
  terraform -chdir=$1 init $BACKEND_FLAG
else
  aws-vault exec $AWS_VAULT_PROFILE -- terraform -chdir=$1 init $BACKEND_FLAG
fi
"""

[tasks."tf:plan"]
description = "Plan Terraform changes. Usage: mise run tf:plan <module-path>"
run = """
#!/bin/bash
if [ -n "$AWS_VAULT" ]; then
  terraform -chdir=$1 plan
else
  aws-vault exec $AWS_VAULT_PROFILE -- terraform -chdir=$1 plan
fi
"""

[tasks."tf:apply"]
description = "Apply Terraform changes. Usage: mise run tf:apply <module-path>"
run = """
#!/bin/bash
if [ -n "$AWS_VAULT" ]; then
  terraform -chdir=$1 apply
else
  aws-vault exec $AWS_VAULT_PROFILE -- terraform -chdir=$1 apply
fi
"""

[tasks."tf:destroy"]
description = "Destroy os recursos de um módulo (teardown da demo). Usage: mise run tf:destroy <module-path>"
run = """
#!/bin/bash
if [ -n "$AWS_VAULT" ]; then
  terraform -chdir=$1 destroy
else
  aws-vault exec $AWS_VAULT_PROFILE -- terraform -chdir=$1 destroy
fi
"""

[tasks."tf:fmt"]
description = "Format all Terraform files recursively"
run = "terraform fmt -recursive ."

[tasks."tf:validate"]
description = "Validate all Terraform modules"
run = """
#!/bin/bash
for d in 00-bootstrap 01-cloud-practitioner/s3-static-site 01-cloud-practitioner/iam-basics 01-cloud-practitioner/billing-alerts 01-cloud-practitioner/ec2-first-instance; do
  echo "Validating $d..."
  terraform -chdir=$d init -backend=false -input=false > /dev/null
  terraform -chdir=$d validate
done
"""

[tasks."bootstrap"]
description = "Initialize and apply the bootstrap module (creates S3 + DynamoDB + CloudTrail + IAM)"
run = ["mise run tf:init 00-bootstrap", "mise run tf:apply 00-bootstrap"]

[tasks."vault:login"]
description = "Abre sessão aws-vault interativa para o profile rbti (8h)"
run = "aws-vault exec $AWS_VAULT_PROFILE --duration=8h -- zsh"

[tasks."setup"]
description = "Setup reproduzível da máquina nova (ferramentas + ~/.aws/config). Não toca em segredos. Ver docs/MIGRATION.md."
run = """
#!/usr/bin/env bash
set -euo pipefail

echo "==> [1/4] Instalando ferramentas pinadas (mise.toml)"
mise install

echo "==> [2/4] Fixando aws-cli no config global do mise"
mise use -g aqua:aws/aws-cli@2.34.60

echo "==> [3/4] Garantindo ~/.aws/config"
mkdir -p "$HOME/.aws"
if [ -f "$HOME/.aws/config" ]; then
  echo "    ~/.aws/config já existe — não vou sobrescrever (compare com docs/aws-config.example)."
else
  cp docs/aws-config.example "$HOME/.aws/config"
  echo "    ~/.aws/config criado a partir de docs/aws-config.example."
fi

echo "==> [4/4] Verificando credencial no cofre aws-vault (segredo, fora do git)"
if aws-vault list --credentials 2>/dev/null | grep -qx "$AWS_VAULT_PROFILE"; then
  echo "    OK: credencial '$AWS_VAULT_PROFILE' presente no cofre."
else
  echo "    FALTA a credencial '$AWS_VAULT_PROFILE'. Faça UMA das opções:"
  echo "      a) copie o diretório ~/.awsvault/keys/ da máquina antiga, OU"
  echo "      b) rode: aws-vault add $AWS_VAULT_PROFILE   (com a access key/secret do IAM)"
fi

echo
echo "Próximos passos:"
echo "  mise run vault:login                                        # destrava o cofre (passphrase)"
echo "  mise run tf:apply 01-cloud-practitioner/ec2-first-instance  # recria a EC2"
echo "O state dos módulos de app é remoto (S3) e reconecta sozinho no 'tf:init'."
"""
