name: Terraform Destroy

# Teardown manual (sob demanda) dos labs. Passa pelo mesmo gate de
# aprovação do Environment "production" antes de destruir.
on:
  workflow_dispatch:
    inputs:
      module:
        description: "Módulo para destruir"
        type: choice
        required: true
        options:
          - s3-static-site
          - ec2-first-instance
          - billing-alerts
          - iam-basics

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_VAR_alert_email: ${{ secrets.TF_VAR_ALERT_EMAIL }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Terraform Init
        run: terraform -chdir=01-cloud-practitioner/${{ inputs.module }} init -input=false -backend-config=backend.hcl

      - name: Terraform Destroy
        run: terraform -chdir=01-cloud-practitioner/${{ inputs.module }} destroy -auto-approve -input=false
