name: Terraform Apply

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  detect-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1...HEAD | grep '\.tf$' | sed 's|/[^/]*\.tf$||' | sort -u | grep -v '^00-bootstrap' || true)
          MODULES=$(echo "$CHANGED" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

  apply:
    runs-on: ubuntu-latest
    needs: detect-modules
    if: needs.detect-modules.outputs.modules != '[]'
    strategy:
      matrix:
        module: ${{ fromJson(needs.detect-modules.outputs.modules) }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        run: terraform -chdir=${{ matrix.module }} init

      - name: Terraform Apply
        run: terraform -chdir=${{ matrix.module }} apply -auto-approve
